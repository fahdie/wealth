<div class="container">
  <div class="loading">
    @if (usersStore.isLoading()) {
      <h2>Loading...</h2>
    }
  </div>
  <div class="error">
    @if (usersStore.error()) {
      {{ usersStore.error() }}
    }
  </div>
  <div class="userList">
    <div class="filter">
      <label for="user-filter">Filter users</label>
      <input
        id="user-filter"
        type="text"
        [formControl]="filterControl"
        placeholder="Search by name, username, email, or ID"
      />
    </div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>User Name</th>
          <th>Email</th>
        </tr>
      </thead>
      <tbody>
        @for (user of filteredUsers(); track user.id) {
          <tr
            role="link"
            tabindex="0"
            [routerLink]="['/users', user.id]"
            routerLinkActive="selected"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <td>{{ user.id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
          </tr>
        } @empty {
          <tr>
            <td colspan="4">No users found.</td>
          </tr>
        }
      </tbody>
    </table>

    <section class="user-details" aria-label="User details (routed)">
      <router-outlet />
    </section>
  </div>
</div>
